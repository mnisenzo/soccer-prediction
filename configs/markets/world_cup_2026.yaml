# World Cup 2026 Market Definitions
# Kalshi-style prediction markets for the FIFA World Cup 2026
#
# Categories:
#   tournament_winner    params: team
#   reaches_stage        params: team, stage (round_of_32 | round_of_16 | quarterfinal | semifinal | final)
#   advances_from_group  params: team
#   group_winner         params: team, group
#   match_outcome        params: home_team, away_team, outcome (H|D|A), is_neutral
#   over_under_goals     params: home_team, away_team, threshold, direction (over|under), is_neutral
#   both_teams_score     params: home_team, away_team, is_neutral
#   clean_sheet          params: team, home_team, away_team, is_neutral
#
# market_price: optional Kalshi implied probability (0.0–1.0) for comparison

markets:

  # ── Tournament Winner ───────────────────────────────────────────────
